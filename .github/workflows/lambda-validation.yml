name: Validate BTM Lambda adapter

on:
  push:
    branches:
      - agent/btm-lambda-calculation
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair-package-lock:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, 'Regenerate package lock')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/btm-lambda-calculation
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate complete npm lockfile
        run: |
          rm -f package-lock.json
          npm install --package-lock-only --no-audit --no-fund
      - name: Commit repaired lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Regenerate package lock"
          git push origin HEAD:agent/btm-lambda-calculation

  lambda-and-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-lambda.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run backend and Lambda tests
        env:
          PYTHONPATH: backend:backend/core
        run: python -m pytest backend/tests -q
      - name: Build Lambda container
        run: docker build -f Dockerfile.lambda -t btm-topographic-lambda:test .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Report existing lint debt
        continue-on-error: true
        run: npm run lint
      - name: Validate Vercel production build
        id: frontend-build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee frontend-build.log
      - name: Upload frontend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: frontend-build.log
      - name: Fail when frontend build failed
        if: steps.frontend-build.outcome == 'failure'
        run: exit 1
