name: Validate BTM Lambda adapter

on:
  push:
    branches:
      - agent/btm-lambda-calculation
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lambda-and-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-lambda.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run backend and Lambda tests
        id: backend-tests
        continue-on-error: true
        env:
          PYTHONPATH: backend:backend/core
        shell: bash
        run: |
          set -o pipefail
          python -m pytest backend/tests -q 2>&1 | tee pytest.log
      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: pytest.log
      - name: Fail when backend tests failed
        if: steps.backend-tests.outcome == 'failure'
        run: exit 1
      - name: Build Lambda container
        run: docker build -f Dockerfile.lambda -t btm-topographic-lambda:test .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Report existing lint debt
        continue-on-error: true
        run: npm run lint
      - name: Validate Vercel production build
        run: npm run build
