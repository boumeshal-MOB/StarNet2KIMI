name: Validate BTM Lambda adapter

on:
  push:
    branches:
      - agent/btm-lambda-calculation
      - agent/vercel-single-fastapi
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lambda-and-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-lambda.txt
            requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run backend and Lambda tests
        env:
          PYTHONPATH: backend:backend/core
        run: python -m pytest backend/tests -q
      - name: Build frontend for the FastAPI bundle
        run: npm ci && npm run build
      - name: Validate single Vercel FastAPI entrypoint
        env:
          PYTHONPATH: .:backend:backend/core
          VERCEL: '1'
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from index import app

          with TestClient(app) as client:
              health = client.get('/api/health')
              assert health.status_code == 200, health.text
              assert health.headers['content-type'].startswith('application/json')

              processings = client.get('/api/processings')
              assert processings.status_code == 200, processings.text
              assert processings.headers['content-type'].startswith('application/json')
              assert isinstance(processings.json(), list)

              frontend = client.get('/')
              assert frontend.status_code == 200, frontend.text
              assert frontend.headers['content-type'].startswith('text/html')
              assert '<div id="root"></div>' in frontend.text
          PY
      - name: Build Lambda container
        run: docker build -f Dockerfile.lambda -t btm-topographic-lambda:test .

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Report existing lint debt
        continue-on-error: true
        run: npm run lint
      - name: Validate Vercel production build
        run: npm run build
