name: Reorganize and validate project

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reorganize-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract archive and publish real repository
        shell: bash
        run: |
          set -euo pipefail
          archive="Kimi_Agent_GitHub 仓库导出.zip"

          if [ -f "$archive" ]; then
            rm -rf .extract
            mkdir .extract
            unzip -q "$archive" -d .extract

            source_dir=".extract"
            if [ -d ".extract/app" ]; then
              source_dir=".extract/app"
            elif [ "$(find .extract -mindepth 1 -maxdepth 1 -type d | wc -l)" -eq 1 ] && [ "$(find .extract -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 0 ]; then
              source_dir="$(find .extract -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            fi

            find "$source_dir" -mindepth 1 -maxdepth 1 -exec cp -a {} . \;
            rm -rf .extract "$archive"
          fi

          find . -name '.DS_Store' -delete
          rm -rf node_modules dist .next

          if [ -d app ] && [ -f app/package.json ] && [ ! -f package.json ]; then
            cp -a app/. .
            rm -rf app
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "Extract project into repository root"
            git push origin main
          fi

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --immutable || yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo 'No package.json found after extraction.' >&2
            exit 1
          fi

      - name: Validate production build
        shell: bash
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            pnpm run lint --if-present
            pnpm run test --if-present
            pnpm run build
          elif [ -f yarn.lock ]; then
            yarn lint --if-present
            yarn test --if-present
            yarn build
          else
            npm run lint --if-present
            npm test --if-present
            npm run build
          fi
